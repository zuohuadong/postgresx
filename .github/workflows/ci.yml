name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build, Type Check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgredis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pgredis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate workspace dependency specs
        run: bun scripts/check-workspace-deps.mjs

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Run tests
        run: bun test packages/

      - name: Run PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/pgredis
        run: bun run test:integration

      - name: Type check
        run: bun run check

      - name: Package smoke test
        run: bun run smoke:pack

  test-pg-matrix:
    name: PG ${{ matrix.pg-version }} Integration
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        pg-version: ["16", "17"]

    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pgredis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pgredis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate workspace dependency specs
        run: bun scripts/check-workspace-deps.mjs

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Run PostgreSQL ${{ matrix.pg-version }} integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/pgredis
        run: bun run test:integration

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, test-pg-matrix]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate workspace dependency specs
        run: bun scripts/check-workspace-deps.mjs

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Publish changed packages
        run: bun run publish:packages -- --provenance
